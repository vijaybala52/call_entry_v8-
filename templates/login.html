<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rapid-I Precision Measuring Systems</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="viewport">
        <div id="loginPage" class="login-page">
            <div class="login-bg-blur">
                <div class="blur-circle-1"></div>
                <div class="blur-circle-2"></div>
            </div>
            
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo-box">
                        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Rapid-I Logo" class="login-logo" />
                    </div>
                </div>
                
                <div class="login-welcome">
                    <h1>Welcome Back!</h1>
                    <p>Sign in to continue to your account</p>
                </div>
                
                <div class="login-form-container">
                    <form id="loginForm">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" placeholder="Email ID or Phone Number" required />
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" placeholder="Enter your password" required />
                        </div>
                        <div class="forgot-password">
                            <button type="button">Forgot Password?</button>
                        </div>
                        <div class="login-buttons">
                            <button type="submit" class="btn-login">Login</button>
                            <button type="button" class="btn-cancel">Cancel</button>
                        </div>
                        <div class="register-link">
                            <p>Don't have an account?</p>
                            <button type="button" id="showRegister">Register Here</button>
                        </div>
                    </form>
                </div>
                
                <div class="login-footer">
                    Rapid-I Precision Measuring Systems © 2026
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
    <script>
        // Login form handler for separate login page
        document.getElementById('loginForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Save login state to localStorage
            localStorage.setItem('isLoggedIn', 'true');
            
            // Redirect to call entry page
            window.location.href = "{{ url_for('call_entry.index') }}";
        });

        // Cancel button
        document.querySelector('.btn-cancel')?.addEventListener('click', function() {
            window.location.href = "{{ url_for('call_entry.index') }}";
        });

        // Check if already logged in, redirect to call entry
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = "{{ url_for('call_entry.index') }}";
        }
    </script>
</body>
</html>
